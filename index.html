<!DOCTYPE html>
<!--
  SBH Roster — staff-facing shift view (view-only)
  =================================================
  Staff log in with their PIN to see the monthly roster.
  No swap functionality — view only.

  SUPABASE SETUP REQUIRED:
  1. Open your Supabase project → SQL Editor
  2. Ensure the verify_pin RPC exists (returns [{staff_name}])
  3. Fill in your anon key below (Settings → API → "anon public" key)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBH Roster</title>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────────────────── */
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --surface3: #2d3148;
  --border: #2d3148; --border2: #3a3f5c; --text: #e2e4ea; --dim: #8b8fa3;
  --gold: #f0c674; --purple: #b48ead; --blue: #81a1c1;
  --green: #a3be8c; --red: #bf616a; --teal: #88c0d0; --amber: #ebcb8b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

/* ── HEADER ────────────────────────────────────────────────────────────── */
.header {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
}
.header-title { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; color: var(--gold); }
.header-sub { font-size: 0.72rem; color: var(--dim); margin-top: 1px; }

/* ── PIN LOGIN ─────────────────────────────────────────────────────────── */
.pin-section {
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
}
.pin-input {
  background: var(--surface); border: 1px solid var(--border2); color: var(--text);
  padding: 0.5rem 0.75rem; border-radius: 7px; width: 130px; font-size: 0.85rem;
  text-align: center; letter-spacing: 0.2em; outline: none; transition: border-color 0.15s;
}
.pin-input:focus { border-color: var(--teal); }
.pin-input.error { border-color: var(--red); }
.pin-btn {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--gold);
  padding: 0.5rem 1rem; border-radius: 7px; cursor: pointer; font-size: 0.85rem;
  font-family: inherit; transition: all 0.15s;
}
.pin-btn:hover { background: var(--surface3); }
.logged-badge {
  display: none; align-items: center; gap: 0.5rem;
  background: rgba(163,190,140,0.1); border: 1px solid rgba(163,190,140,0.3);
  color: var(--green); padding: 0.4rem 0.9rem; border-radius: 7px; font-size: 0.82rem;
}
.logout-btn {
  background: none; border: none; color: var(--dim); cursor: pointer; font-size: 0.75rem;
  padding: 0 0.25rem; font-family: inherit;
}
.logout-btn:hover { color: var(--text); }

/* ── MONTH NAV ─────────────────────────────────────────────────────────── */
.month-nav {
  display: flex; align-items: center; gap: 0.75rem; justify-content: center;
  padding: 0.65rem 1rem; border-bottom: 1px solid var(--border);
}
.nav-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--dim);
  padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  font-family: inherit; transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--border2); color: var(--text); }
.month-label { font-size: 0.95rem; font-weight: 600; min-width: 140px; text-align: center; }

/* ── STATUS BAR ────────────────────────────────────────────────────────── */
.status-bar {
  margin: 0.75rem 1rem 0; padding: 0.65rem 1rem; border-radius: 8px;
  font-size: 0.82rem; display: none; align-items: center; gap: 0.5rem;
}
.status-bar.show { display: flex; }
.status-bar.info  { background: rgba(136,192,208,0.1); border: 1px solid rgba(136,192,208,0.3); color: var(--teal); }
.status-bar.ok    { background: rgba(163,190,140,0.1); border: 1px solid rgba(163,190,140,0.3); color: var(--green); }
.status-bar.warn  { background: rgba(240,198,116,0.1); border: 1px solid rgba(240,198,116,0.3); color: var(--gold); }
.status-bar.error { background: rgba(191,97,106,0.1);  border: 1px solid rgba(191,97,106,0.3);  color: var(--red); }
.status-bar .dismiss {
  margin-left: auto; background: none; border: none; color: inherit; cursor: pointer;
  font-size: 0.9rem; opacity: 0.6; font-family: inherit; padding: 0;
}

/* ── MAIN GRID ─────────────────────────────────────────────────────────── */
main { padding: 0.75rem 0.75rem 2rem; max-width: 900px; margin: 0 auto; }

.loading, .load-error {
  text-align: center; padding: 3rem; font-size: 0.9rem; color: var(--dim);
}
.load-error { color: var(--red); }

/* day-of-week header row */
.cal-header {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  gap: 2px; margin-bottom: 2px;
}
.cal-header-cell {
  background: var(--surface2); padding: 0.4rem 0.2rem;
  text-align: center; font-size: 0.68rem; font-weight: 600;
  color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em;
  border-radius: 4px;
}
.cal-header-cell.weekend { color: var(--amber); }

/* week row */
.week-row {
  display: grid; grid-template-columns: 56px repeat(7, 1fr);
  gap: 2px; margin-bottom: 2px;
}
.week-label-cell {
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; font-weight: 700; color: var(--dim); letter-spacing: 0.03em;
  background: var(--surface); border-radius: 4px;
}

/* day cell */
.day-cell {
  background: var(--surface); border-radius: 4px;
  min-height: 58px; padding: 3px; position: relative;
  border: 1px solid transparent;
}
.day-cell.today-col { border-color: rgba(240,198,116,0.3); }
.day-cell.weekend { background: rgba(240,198,116,0.03); }

.day-date {
  font-size: 0.6rem; color: var(--dim); text-align: right;
  padding: 1px 2px 2px; line-height: 1;
}
.day-cell.today-col .day-date { color: var(--gold); font-weight: 700; }

.shifts-in-cell { display: flex; flex-direction: column; gap: 2px; }

/* shift pill — view only, never interactive */
.shift-pill {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2px 5px; border-radius: 4px; font-size: 0.68rem; font-weight: 600;
  cursor: default; border: 1.5px solid transparent;
  user-select: none; gap: 3px;
}
/* slightly brighter pill for the logged-in user */
.shift-pill.mine { filter: brightness(1.35); font-weight: 800; }

/* shift type tints */
.type-S1     { background: rgba(163,190,140,0.15); color: var(--green);  border-color: rgba(163,190,140,0.2); }
.type-S2     { background: rgba(180,142,173,0.15); color: var(--purple); border-color: rgba(180,142,173,0.2); }
.type-S3     { background: rgba(180,142,173,0.15); color: var(--purple); border-color: rgba(180,142,173,0.2); }
.type-S4     { background: rgba(129,161,193,0.15); color: var(--blue);   border-color: rgba(129,161,193,0.2); }
.type-Sunday { background: rgba(235,203,139,0.15); color: var(--amber);  border-color: rgba(235,203,139,0.2); }

/* person dot inside pill */
.pill-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.pill-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* empty cell placeholder */
.no-shifts { color: var(--border2); font-size: 0.55rem; text-align: center; padding-top: 6px; }

/* ── LEGEND ────────────────────────────────────────────────────────────── */
.legend {
  display: flex; flex-wrap: wrap; gap: 0.6rem 1rem; margin-top: 1rem;
  padding: 0.75rem 1rem; background: var(--surface); border-radius: 8px;
  font-size: 0.72rem; color: var(--dim);
}
.legend-item { display: flex; align-items: center; gap: 0.35rem; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── RESPONSIVE ────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .cal-header { grid-template-columns: 36px repeat(7, 1fr); }
  .week-row    { grid-template-columns: 36px repeat(7, 1fr); }
  .week-label-cell { font-size: 0.55rem; }
  .day-cell { min-height: 50px; padding: 2px; }
  .shift-pill { font-size: 0.62rem; padding: 2px 3px; }
  .pill-dot { display: none; }
  .pill-name { font-size: 0.62rem; }
  .header-title { font-size: 1.1rem; }
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────── -->
<div class="header">
  <div>
    <div class="header-title">SBH ROSTER</div>
    <div class="header-sub">Shift view</div>
  </div>
  <div class="pin-section">
    <input class="pin-input" id="pinInput" type="password" maxlength="4" placeholder="PIN" autocomplete="off">
    <button class="pin-btn" id="pinBtn">Log in</button>
    <div class="logged-badge" id="loggedBadge">
      <span id="loggedName"></span>
      <button class="logout-btn" id="logoutBtn" title="Log out">✕</button>
    </div>
  </div>
</div>

<!-- ── MONTH NAV ───────────────────────────────────────────────────────── -->
<div class="month-nav">
  <button class="nav-btn" id="prevBtn">&#8592;</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="nav-btn" id="nextBtn">&#8594;</button>
</div>

<!-- ── STATUS BAR ─────────────────────────────────────────────────────── -->
<div class="status-bar" id="statusBar">
  <span id="statusText"></span>
  <button class="dismiss" id="statusDismiss">✕</button>
</div>

<!-- ── MAIN CONTENT ────────────────────────────────────────────────────── -->
<main>
  <div id="calContainer"><div class="loading">Loading roster…</div></div>
  <div class="legend" id="legendRow"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG — fill in your anon key (Supabase → Settings → API → anon public)
// ═══════════════════════════════════════════════════════════════════════════
const SUPABASE_URL      = 'https://geheirnfbhqnhrjmrrax.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlaGVpcm5mYmhxbmhyam1ycmF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NjQ2MzEsImV4cCI6MjA5MTM0MDYzMX0.vSlZoPo0nhHRMPARJZHZWyuWFyY2pb4Ck3YzwEjVslQ';
// ═══════════════════════════════════════════════════════════════════════════

const STAFF_COLORS = {
  'Max':    '#F0C674',
  'Huda':   '#B48EAD',
  'Rui En': '#81A1C1',
  'Elisa':  '#A3BE8C',
};
const STAFF_ORDER = ['Max', 'Huda', 'Rui En', 'Elisa'];

const SHIFT_DEFS = {
  'S1':     { label: 'Shift 1', time: '7:00–15:00',  min: 1 },
  'S2':     { label: 'Shift 2', time: '14:00–22:00', min: 1 },
  'S3':     { label: 'Shift 3', time: '13:30–21:30', min: 2 },
  'S4':     { label: 'Shift 4', time: '9:00–17:00',  min: 1 },
  'Sunday': { label: 'Sunday',  time: '10:00–18:00', min: 1 },
};

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ──────────────────────────────────────────────────────────────────
let monthOffset = 0;   // 0 = current month
let myName      = null; // logged-in staff name
let allShifts   = [];   // raw shifts from DB for visible month

// ── Session (sessionStorage) ───────────────────────────────────────────────
function restoreSession() {
  try { myName = sessionStorage.getItem('sbh_name') || null; } catch(_) {}
}
function saveSession(name) {
  try { sessionStorage.setItem('sbh_name', name); } catch(_) {}
}
function clearSession() {
  myName = null;
  try { sessionStorage.removeItem('sbh_name'); } catch(_) {}
}

// ── Date helpers ───────────────────────────────────────────────────────────
function getMonthBounds(offset) {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + offset);
  d.setHours(0, 0, 0, 0);
  const start = new Date(d);
  const end   = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  return { start, end, year: d.getFullYear(), month: d.getMonth() };
}

function fmt(d)     { return d.toISOString().slice(0, 10); }
function todayStr() { return fmt(new Date()); }

function monthName(m, y) {
  return new Date(y, m, 1).toLocaleString('en', { month: 'long', year: 'numeric' });
}

// Returns Mon–Sun week arrays covering the full month
function getWeeksForMonth(year, month) {
  const weeks = [];
  const first = new Date(year, month, 1);
  const dow   = first.getDay(); // 0=Sun
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  let monday = new Date(year, month, 1 + mondayOffset);

  while (true) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      week.push(d);
    }
    weeks.push(week);
    const next = new Date(monday);
    next.setDate(next.getDate() + 7);
    if (next.getMonth() !== month && next > new Date(year, month + 1, 0)) break;
    monday = next;
    if (monday.getMonth() > month && monday.getFullYear() >= year) break;
  }
  return weeks;
}

// ── Status bar ─────────────────────────────────────────────────────────────
function showStatus(msg, type = 'info', autoDismiss = 0) {
  const bar  = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  bar.className = `status-bar show ${type}`;
  text.textContent = msg;
  if (autoDismiss > 0) setTimeout(() => bar.classList.remove('show'), autoDismiss);
}
function hideStatus() { document.getElementById('statusBar').classList.remove('show'); }

// ── Auth UI ────────────────────────────────────────────────────────────────
function updateAuthUI() {
  const badge    = document.getElementById('loggedBadge');
  const nameEl   = document.getElementById('loggedName');
  const pinInput = document.getElementById('pinInput');
  const pinBtn   = document.getElementById('pinBtn');
  if (myName) {
    badge.style.display = 'flex';
    nameEl.textContent  = `✓ ${myName}`;
    pinInput.style.display = 'none';
    pinBtn.style.display   = 'none';
  } else {
    badge.style.display    = 'none';
    pinInput.style.display = '';
    pinBtn.style.display   = '';
  }
}

async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;
  const { data, error } = await db.rpc('verify_pin', { p_pin: pin });
  if (error || !data || data.length === 0) {
    const el = document.getElementById('pinInput');
    el.classList.add('error');
    setTimeout(() => el.classList.remove('error'), 1500);
    showStatus('Invalid PIN', 'error', 2500);
    return;
  }
  myName = data[0].staff_name;
  saveSession(myName);
  updateAuthUI();
  renderCalendar();
  showStatus(`Logged in as ${myName}`, 'ok', 2000);
}

function doLogout() {
  clearSession();
  updateAuthUI();
  renderCalendar();
  hideStatus();
}

// ── Load roster ────────────────────────────────────────────────────────────
async function loadRoster() {
  const { start, end, year, month } = getMonthBounds(monthOffset);
  document.getElementById('monthLabel').textContent = monthName(month, year);

  const { data, error } = await db
    .from('attendance_shifts')
    .select('id, staff_id, shift_date, shift_type, start_time, end_time, attendance_staff(name)')
    .gte('shift_date', fmt(start))
    .lte('shift_date', fmt(end))
    .order('shift_date')
    .order('start_time');

  if (error) {
    document.getElementById('calContainer').innerHTML =
      `<div class="load-error">Error loading roster: ${error.message}</div>`;
    return;
  }
  allShifts = data || [];
  renderCalendar();
}

// ── Render calendar ────────────────────────────────────────────────────────
function renderCalendar() {
  const { year, month } = getMonthBounds(monthOffset);
  const weeks = getWeeksForMonth(year, month);
  const today = todayStr();

  // Build shift lookup: date → [shift, ...]
  const byDate = {};
  for (const s of allShifts) {
    if (!byDate[s.shift_date]) byDate[s.shift_date] = [];
    byDate[s.shift_date].push(s);
  }

  const DAYS_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  let html = '';

  // Day-of-week header
  html += '<div class="cal-header">';
  html += '<div class="cal-header-cell"></div>';
  for (let i = 0; i < 7; i++) {
    const isWknd = i >= 5;
    html += `<div class="cal-header-cell${isWknd ? ' weekend' : ''}">${DAYS_SHORT[i]}</div>`;
  }
  html += '</div>';

  // Week rows
  for (let wi = 0; wi < weeks.length; wi++) {
    const week = weeks[wi];
    html += `<div class="week-row">`;
    html += `<div class="week-label-cell">W${wi + 1}</div>`;

    for (let di = 0; di < 7; di++) {
      const d        = week[di];
      const ds       = fmt(d);
      const inMonth  = d.getMonth() === month;
      const isToday  = ds === today;
      const isWknd   = di >= 5;

      let cellClass = 'day-cell';
      if (isToday)  cellClass += ' today-col';
      if (isWknd)   cellClass += ' weekend';
      if (!inMonth) cellClass += ' out-of-month';

      const shifts = byDate[ds] || [];

      html += `<div class="${cellClass}">`;
      html += `<div class="day-date">${d.getDate()}</div>`;
      html += `<div class="shifts-in-cell">`;

      if (shifts.length === 0) {
        if (inMonth) html += `<div class="no-shifts">—</div>`;
      } else {
        shifts.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
        for (const sh of shifts) {
          const staffName = sh.attendance_staff?.name || '?';
          const color     = STAFF_COLORS[staffName] || '#8b8fa3';
          const isMe      = myName && staffName === myName;

          let pillClass = `shift-pill type-${sh.shift_type.replace(/\s+/g, '')}`;
          if (isMe) pillClass += ' mine';

          html += `<div class="${pillClass}"
            title="${staffName}: ${sh.shift_type} ${sh.start_time}–${sh.end_time}">
            <span class="pill-dot" style="background:${color}"></span>
            <span class="pill-name">${staffName}</span>
          </div>`;
        }
      }

      html += '</div></div>';
    }
    html += '</div>';
  }

  document.getElementById('calContainer').innerHTML = html;
  renderLegend();
}

// ── Render legend ──────────────────────────────────────────────────────────
function renderLegend() {
  let html = '';
  for (const [name, color] of Object.entries(STAFF_COLORS)) {
    const isMe = name === myName;
    html += `<div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      <span style="${isMe ? `color:${color};font-weight:700` : ''}">${name}</span>
    </div>`;
  }
  document.getElementById('legendRow').innerHTML = html;
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('pinBtn').addEventListener('click', doLogin);
document.getElementById('pinInput').addEventListener('keyup', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.getElementById('prevBtn').addEventListener('click', () => { monthOffset--; loadRoster(); });
document.getElementById('nextBtn').addEventListener('click', () => { monthOffset++; loadRoster(); });
document.getElementById('statusDismiss').addEventListener('click', hideStatus);

restoreSession();
updateAuthUI();
loadRoster();
</script>
</body>
</html>

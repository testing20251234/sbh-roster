<!DOCTYPE html>
<!--
  SBH Roster — staff-facing shift view + swap requests
  =====================================================
  SUPABASE SETUP REQUIRED:
  1. Open your Supabase project → SQL Editor
  2. Run the migration block at the bottom of this file comment section
  3. Fill in your anon key below (Settings → API → "anon public" key)

  ── SQL to run once in Supabase SQL Editor ──────────────────────────────────

  CREATE OR REPLACE FUNCTION request_swap(
    p_pin TEXT,
    p_my_shift_id UUID,
    p_their_shift_id UUID
  ) RETURNS JSON
  LANGUAGE plpgsql SECURITY DEFINER
  AS $$
  DECLARE
    v_staff_id UUID;
    v_target_staff_id UUID;
  BEGIN
    SELECT id INTO v_staff_id FROM attendance_staff WHERE pin = p_pin AND is_active = true;
    IF v_staff_id IS NULL THEN RETURN '{"error":"Invalid PIN"}'::json; END IF;

    IF NOT EXISTS (SELECT 1 FROM attendance_shifts WHERE id = p_my_shift_id AND staff_id = v_staff_id) THEN
      RETURN '{"error":"That is not your shift"}'::json;
    END IF;

    SELECT staff_id INTO v_target_staff_id FROM attendance_shifts WHERE id = p_their_shift_id;
    IF v_target_staff_id IS NULL THEN RETURN '{"error":"Target shift not found"}'::json; END IF;

    IF v_staff_id = v_target_staff_id THEN
      RETURN '{"error":"Cannot swap with yourself"}'::json;
    END IF;

    INSERT INTO swap_requests (requester_id, requester_shift_id, target_id, target_shift_id)
    VALUES (v_staff_id, p_my_shift_id, v_target_staff_id, p_their_shift_id)
    ON CONFLICT (requester_shift_id, target_shift_id) DO NOTHING;

    RETURN '{"ok":true}'::json;
  END;
  $$;

  -- Allow anon to call request_swap (PIN validates identity server-side)
  GRANT EXECUTE ON FUNCTION request_swap(TEXT, UUID, UUID) TO anon;

  -- Allow anon to read swap_requests (to show pending swaps)
  CREATE POLICY "anon_read_swaps" ON swap_requests FOR SELECT TO anon USING (true);

  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBH Roster</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --surface3: #2d3148;
  --border: #2d3148; --border2: #3a3f5c; --text: #e2e4ea; --dim: #8b8fa3;
  --gold: #f0c674; --purple: #b48ead; --blue: #81a1c1;
  --green: #a3be8c; --red: #bf616a; --teal: #88c0d0; --amber: #ebcb8b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

/* ── HEADER ── */
.header {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
}
.header-title { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; color: var(--gold); }
.header-sub { font-size: 0.72rem; color: var(--dim); margin-top: 1px; }

/* ── PIN LOGIN ── */
.pin-section {
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
}
.pin-input {
  background: var(--surface); border: 1px solid var(--border2); color: var(--text);
  padding: 0.5rem 0.75rem; border-radius: 7px; width: 130px; font-size: 0.85rem;
  text-align: center; letter-spacing: 0.2em; outline: none; transition: border-color 0.15s;
}
.pin-input:focus { border-color: var(--teal); }
.pin-input.error { border-color: var(--red); }
.pin-btn {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--gold);
  padding: 0.5rem 1rem; border-radius: 7px; cursor: pointer; font-size: 0.85rem;
  font-family: inherit; transition: all 0.15s;
}
.pin-btn:hover { background: var(--surface3); }
.logged-badge {
  display: none; align-items: center; gap: 0.5rem;
  background: rgba(163,190,140,0.1); border: 1px solid rgba(163,190,140,0.3);
  color: var(--green); padding: 0.4rem 0.9rem; border-radius: 7px; font-size: 0.82rem;
}
.logout-btn {
  background: none; border: none; color: var(--dim); cursor: pointer; font-size: 0.75rem;
  padding: 0 0.25rem; font-family: inherit;
}
.logout-btn:hover { color: var(--text); }

/* ── MONTH NAV ── */
.month-nav {
  display: flex; align-items: center; gap: 0.75rem; justify-content: center;
  padding: 0.65rem 1rem; border-bottom: 1px solid var(--border);
}
.nav-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--dim);
  padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  font-family: inherit; transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--border2); color: var(--text); }
.month-label { font-size: 0.95rem; font-weight: 600; min-width: 140px; text-align: center; }

/* ── STATUS BAR ── */
.status-bar {
  margin: 0.75rem 1rem 0; padding: 0.65rem 1rem; border-radius: 8px;
  font-size: 0.82rem; display: none; align-items: center; gap: 0.5rem;
}
.status-bar.show { display: flex; }
.status-bar.info  { background: rgba(136,192,208,0.1); border: 1px solid rgba(136,192,208,0.3); color: var(--teal); }
.status-bar.ok    { background: rgba(163,190,140,0.1); border: 1px solid rgba(163,190,140,0.3); color: var(--green); }
.status-bar.warn  { background: rgba(240,198,116,0.1); border: 1px solid rgba(240,198,116,0.3); color: var(--gold); }
.status-bar.error { background: rgba(191,97,106,0.1);  border: 1px solid rgba(191,97,106,0.3);  color: var(--red); }
.status-bar .dismiss {
  margin-left: auto; background: none; border: none; color: inherit; cursor: pointer;
  font-size: 0.9rem; opacity: 0.6; font-family: inherit; padding: 0;
}

/* ── MAIN GRID ── */
main { padding: 0.75rem 0.75rem 2rem; max-width: 900px; margin: 0 auto; }

.loading, .load-error {
  text-align: center; padding: 3rem; font-size: 0.9rem; color: var(--dim);
}
.load-error { color: var(--red); }

/* day-of-week header row */
.cal-header {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  gap: 2px; margin-bottom: 2px;
}
.cal-header-cell {
  background: var(--surface2); padding: 0.4rem 0.2rem;
  text-align: center; font-size: 0.68rem; font-weight: 600;
  color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em;
  border-radius: 4px;
}
.cal-header-cell.weekend { color: var(--amber); }

/* week row */
.week-row {
  display: grid; grid-template-columns: 56px repeat(7, 1fr);
  gap: 2px; margin-bottom: 2px;
}
.week-label-cell {
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; font-weight: 700; color: var(--dim); letter-spacing: 0.03em;
  background: var(--surface); border-radius: 4px;
}

/* day cell */
.day-cell {
  background: var(--surface); border-radius: 4px;
  min-height: 58px; padding: 3px; position: relative;
  border: 1px solid transparent; transition: border-color 0.15s;
}
.day-cell.today-col { border-color: rgba(240,198,116,0.3); }
.day-cell.weekend { background: rgba(240,198,116,0.03); }

.day-date {
  font-size: 0.6rem; color: var(--dim); text-align: right;
  padding: 1px 2px 2px; line-height: 1;
}
.day-cell.today-col .day-date { color: var(--gold); font-weight: 700; }

.shifts-in-cell { display: flex; flex-direction: column; gap: 2px; }

/* shift pill inside a day cell */
.shift-pill {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2px 5px; border-radius: 4px; font-size: 0.68rem; font-weight: 600;
  cursor: default; border: 1.5px solid transparent; transition: all 0.13s;
  user-select: none; gap: 3px;
}
.shift-pill.clickable { cursor: pointer; }
.shift-pill.clickable:hover { filter: brightness(1.2); transform: scale(1.02); }

/* shift type tints */
.type-S1     { background: rgba(163,190,140,0.15); color: var(--green);  border-color: rgba(163,190,140,0.2); }
.type-S2     { background: rgba(180,142,173,0.15); color: var(--purple); border-color: rgba(180,142,173,0.2); }
.type-S3     { background: rgba(180,142,173,0.15); color: var(--purple); border-color: rgba(180,142,173,0.2); }
.type-S4     { background: rgba(129,161,193,0.15); color: var(--blue);   border-color: rgba(129,161,193,0.2); }
.type-Sunday { background: rgba(235,203,139,0.15); color: var(--amber);  border-color: rgba(235,203,139,0.2); }

/* person dot inside pill */
.pill-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.pill-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* selected + swap candidate states */
.shift-pill.selected {
  border-color: var(--teal) !important;
  box-shadow: 0 0 0 2px rgba(136,192,208,0.35);
  filter: brightness(1.3);
}
.shift-pill.swap-candidate {
  border-color: var(--gold) !important;
  box-shadow: 0 0 0 2px rgba(240,198,116,0.25);
  animation: pulse-gold 1.3s ease-in-out infinite;
}
@keyframes pulse-gold {
  0%,100% { box-shadow: 0 0 0 2px rgba(240,198,116,0.2); }
  50%      { box-shadow: 0 0 0 5px rgba(240,198,116,0.35); }
}

/* empty cell placeholder */
.no-shifts { color: var(--border2); font-size: 0.55rem; text-align: center; padding-top: 6px; }

/* ── LEGEND ── */
.legend {
  display: flex; flex-wrap: wrap; gap: 0.6rem 1rem; margin-top: 1rem;
  padding: 0.75rem 1rem; background: var(--surface); border-radius: 8px;
  font-size: 0.72rem; color: var(--dim);
}

.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── PENDING SWAPS ── */
.pending-section {
  margin-top: 1.25rem; padding: 0.75rem 1rem; background: var(--surface);
  border-radius: 8px; border: 1px solid var(--border);
}
.pending-title {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--dim); font-weight: 600; margin-bottom: 0.6rem;
}
.pending-item {
  padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  font-size: 0.78rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.pending-item:last-child { border-bottom: none; }
.pending-badge {
  font-size: 0.65rem; padding: 1px 6px; border-radius: 4px; font-weight: 600;
  background: rgba(235,203,139,0.15); color: var(--amber); border: 1px solid rgba(235,203,139,0.3);
}
.empty-pending { color: var(--dim); font-size: 0.78rem; font-style: italic; }

/* ── CONFIRM DIALOG ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 1rem;
}
.overlay.show { display: flex; }
.dialog {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 1.5rem; max-width: 420px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.dialog h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
.dialog .swap-desc {
  font-size: 0.82rem; color: var(--dim); margin-bottom: 1.25rem; line-height: 1.5;
}
.dialog .swap-desc strong { color: var(--text); }
.dialog-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
.dialog-btn {
  padding: 0.55rem 1.25rem; border-radius: 7px; font-size: 0.85rem;
  cursor: pointer; font-family: inherit; transition: all 0.15s; border: 1px solid;
}
.dialog-btn.cancel {
  background: var(--surface2); border-color: var(--border2); color: var(--dim);
}
.dialog-btn.cancel:hover { color: var(--text); }
.dialog-btn.confirm {
  background: rgba(136,192,208,0.15); border-color: var(--teal); color: var(--teal);
}
.dialog-btn.confirm:hover { background: rgba(136,192,208,0.25); }
.dialog-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .cal-header { grid-template-columns: 36px repeat(7, 1fr); }
  .week-row    { grid-template-columns: 36px repeat(7, 1fr); }
  .week-label-cell { font-size: 0.55rem; }
  .day-cell { min-height: 50px; padding: 2px; }
  .shift-pill { font-size: 0.62rem; padding: 2px 3px; }
  .pill-dot { display: none; }
  .pill-name { font-size: 0.62rem; }
  .header-title { font-size: 1.1rem; }
  .dialog { padding: 1.1rem; }
}
</style>

const SHIFT_DEFS = {
  'S1':     { label: 'Shift 1', time: '7:00–15:00',  min: 1 },
  'S2':     { label: 'Shift 2', time: '14:00–22:00', min: 1 },
  'S3':     { label: 'Shift 3', time: '13:30–21:30', min: 2 },
  'S4':     { label: 'Shift 4', time: '9:00–17:00',  min: 1 },

// ── State ──────────────────────────────────────────────────────────────
let monthOffset = 0;   // 0 = current month
let myName = null;     // logged-in staff name
let myPin  = null;     // stored in sessionStorage for RPC call
let allShifts = [];    // raw shifts from DB for visible month
let selection = null;  // { shiftId, staffName, shiftType, shiftDate, startTime, endTime }

// ── Supabase session (sessionStorage) ─────────────────────────────────
function restoreSession() {
  try {
    myName = sessionStorage.getItem('sbh_name') || null;
    myPin  = sessionStorage.getItem('sbh_pin')  || null;
  } catch(_) {}
}
function saveSession(name, pin) {
  try {
    sessionStorage.setItem('sbh_name', name);
    sessionStorage.setItem('sbh_pin',  pin);
  } catch(_) {}
}
function clearSession() {
  myName = null; myPin = null;
  try { sessionStorage.removeItem('sbh_name'); sessionStorage.removeItem('sbh_pin'); } catch(_) {}
}

// ── Date helpers ────────────────────────────────────────────────────────
function getMonthBounds(offset) {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + offset);
  d.setHours(0, 0, 0, 0);
  const start = new Date(d);
  const end   = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  return { start, end, year: d.getFullYear(), month: d.getMonth() };
}

function fmt(d)     { return d.toISOString().slice(0, 10); }
function todayStr() { return fmt(new Date()); }

function monthName(m, y) {
  return new Date(y, m, 1).toLocaleString('en', { month: 'long', year: 'numeric' });
}

// Get Mon–Sun weeks that cover the month
function getWeeksForMonth(year, month) {
  const weeks = [];
  // First Monday on or before the 1st
  const first = new Date(year, month, 1);
  const dow   = first.getDay(); // 0=Sun
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  let monday = new Date(year, month, 1 + mondayOffset);

  while (true) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      week.push(d);
    }
    weeks.push(week);
    // Stop when Monday is past the last day of the month
    const next = new Date(monday);
    next.setDate(next.getDate() + 7);
    if (next.getMonth() !== month && next > new Date(year, month + 1, 0)) break;
    monday = next;
    if (monday.getMonth() > month && monday.getFullYear() >= year) break;
  }
  return weeks;
}

// ── Status bar ──────────────────────────────────────────────────────────
function showStatus(msg, type = 'info', autoDismiss = 0) {
  const bar  = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  bar.className = `status-bar show ${type}`;
  text.textContent = msg;
  if (autoDismiss > 0) setTimeout(() => bar.classList.remove('show'), autoDismiss);
}
function hideStatus() { document.getElementById('statusBar').classList.remove('show'); }

// ── Auth UI ─────────────────────────────────────────────────────────────
function updateAuthUI() {
  const badge    = document.getElementById('loggedBadge');
  const nameEl   = document.getElementById('loggedName');
  const pinInput = document.getElementById('pinInput');
  const pinBtn   = document.getElementById('pinBtn');
  if (myName) {
    badge.style.display = 'flex';
    nameEl.textContent = `✓ ${myName}`;
    pinInput.style.display = 'none';
    pinBtn.style.display   = 'none';
  } else {
    badge.style.display = 'none';
    pinInput.style.display = '';
    pinBtn.style.display   = '';
  }
}

async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;
  const { data, error } = await db.rpc('verify_pin', { p_pin: pin });
  if (error || !data || data.length === 0) {
    const el = document.getElementById('pinInput');
    el.classList.add('error');
    setTimeout(() => el.classList.remove('error'), 1500);
    showStatus('Invalid PIN', 'error', 2500);
    return;
  }
  myName = data[0].staff_name;
  myPin  = pin;
  saveSession(myName, pin);
  updateAuthUI();
  selection = null;
  renderCalendar();
  loadPending();
  showStatus(`Logged in as ${myName}`, 'ok', 2000);
}

function doLogout() {
  clearSession(); selection = null;
  updateAuthUI();
  renderCalendar();
  loadPending();
  hideStatus();
}

// ── Load roster ──────────────────────────────────────────────────────────
async function loadRoster() {
  const { start, end, year, month } = getMonthBounds(monthOffset);
  document.getElementById('monthLabel').textContent = monthName(month, year);

  const { data, error } = await db
    .from('attendance_shifts')
    .select('id, staff_id, shift_date, shift_type, start_time, end_time, attendance_staff(name)')
    .gte('shift_date', fmt(start))
    .lte('shift_date', fmt(end))
    .order('shift_date')
    .order('start_time');

  if (error) {
    document.getElementById('calContainer').innerHTML =
      `<div class="load-error">Error loading roster: ${error.message}</div>`;
    return;
  }
  allShifts = data || [];
  selection = null;
  renderCalendar();
  loadPending();
}

// ── Pending swaps ────────────────────────────────────────────────────────
async function loadPending() {
  const section = document.getElementById('pendingSection');
  const list    = document.getElementById('pendingList');
  if (!myName) { section.style.display = 'none'; return; }

  // Get my staff_id first
  const { data: meData } = await db
    .from('attendance_staff')
    .select('id')
    .eq('name', myName)
    .single();
  if (!meData) return;

  const myId = meData.id;
  const { data: swaps } = await db
    .from('swap_requests')
    .select(`id, status, requested_at,
      requester:requester_id(id, name),
      target:target_id(id, name),
      requester_shift:requester_shift_id(shift_date, shift_type, start_time),
      target_shift:target_shift_id(shift_date, shift_type, start_time)`)
    .or(`requester_id.eq.${myId},target_id.eq.${myId}`)
    .eq('status', 'pending')
    .order('requested_at', { ascending: false })
    .limit(10);

  if (!swaps || swaps.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  let html = '';
  for (const s of swaps) {
    const rs = s.requester_shift;
    const ts = s.target_shift;
    const rsDate = rs ? fmtDate(rs.shift_date) : '?';
    const tsDate = ts ? fmtDate(ts.shift_date) : '?';
    const isRequester = s.requester && s.requester.id === myId;
    const role = isRequester ? 'You requested' : 'Incoming from';
    const other = isRequester ? (s.target?.name || '?') : (s.requester?.name || '?');
    html += `<div class="pending-item">
      <span class="pending-badge">pending</span>
      <span>${role} <strong>${other}</strong>:
        ${rs?.shift_type || '?'} on ${rsDate}
        ↔ ${ts?.shift_type || '?'} on ${tsDate}
      </span>
    </div>`;
  }
  list.innerHTML = html;
}

function fmtDate(dateStr) {
  if (!dateStr) return '?';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ── Render calendar ────────────────────────────────────────────────────
function renderCalendar() {
  const { year, month } = getMonthBounds(monthOffset);
  const weeks = getWeeksForMonth(year, month);
  const today = todayStr();

  // Build shift lookup: date → [shift, ...]
  const byDate = {};
  for (const s of allShifts) {
    if (!byDate[s.shift_date]) byDate[s.shift_date] = [];
    byDate[s.shift_date].push(s);
  }

  const DAYS_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  let html = '';

  // Header
  html += '<div class="cal-header">';
  html += '<div class="cal-header-cell"></div>';
  for (let i = 0; i < 7; i++) {
    const isWknd = i >= 5;
    html += `<div class="cal-header-cell${isWknd ? ' weekend' : ''}">${DAYS_SHORT[i]}</div>`;
  }
  html += '</div>';

  // Weeks
  for (let wi = 0; wi < weeks.length; wi++) {
    const week = weeks[wi];
    html += `<div class="week-row">`;
    html += `<div class="week-label-cell">W${wi + 1}</div>`;

    for (let di = 0; di < 7; di++) {
      const d = week[di];
      const ds = fmt(d);
      const inMonth = d.getMonth() === month;
      const isToday = ds === today;
      const isWknd  = di >= 5;
      let cellClass = 'day-cell';
      if (isToday)  cellClass += ' today-col';
      if (isWknd)   cellClass += ' weekend';
      if (!inMonth) cellClass += ' out-of-month';

      const shifts = byDate[ds] || [];

      html += `<div class="${cellClass}">`;
      html += `<div class="day-date">${d.getDate()}</div>`;
      html += `<div class="shifts-in-cell">`;

      if (shifts.length === 0) {
        if (inMonth) html += `<div class="no-shifts">—</div>`;
      } else {
        // Sort by start time
        shifts.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
        for (const sh of shifts) {
          const staffName = sh.attendance_staff?.name || '?';
          const color  = STAFF_COLORS[staffName] || '#8b8fa3';
          const isMe   = myName && staffName === myName;
          const isSel  = selection && selection.shiftId === sh.id;
          const isCand = selection && !isSel && canSwap(selection, sh);

          let pillClass = `shift-pill type-${sh.shift_type.replace(/\s+/g, '')}`;
          if (isMe || selection) pillClass += ' clickable';
          if (isSel)             pillClass += ' selected';
          else if (isCand)       pillClass += ' swap-candidate';

          const onclick = (isMe && !isSel) || isCand || isSel
            ? `onclick="handlePillClick('${sh.id}')"`
            : '';

          html += `<div class="${pillClass}" ${onclick}
            data-shift-id="${sh.id}"
            title="${staffName}: ${sh.shift_type} ${sh.start_time}–${sh.end_time}">
            <span class="pill-dot" style="background:${color}"></span>
            <span class="pill-name">${staffName}</span>
          </div>`;
        }
      }

      html += '</div></div>';
    }
    html += '</div>';
  }

  document.getElementById('calContainer').innerHTML = html;

  // Render legend
  renderLegend();
}

function renderLegend() {
  let html = '';
  for (const [name, color] of Object.entries(STAFF_COLORS)) {
    const isMe = name === myName;
    html += `<div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      <span style="${isMe ? `color:${color};font-weight:700` : ''}">${name}</span>
    </div>`;
  }
  html += `<div class="legend-item" style="margin-left:auto;gap:0.5rem">
    <span style="color:var(--teal)">■</span><span>selected</span>
    <span style="color:var(--gold);margin-left:0.5rem">■</span><span>swap target</span>
  </div>`;
  document.getElementById('legendRow').innerHTML = html;
}

// ── Swap logic ────────────────────────────────────────────────────────
// selection = { shiftId, staffName, shiftType, shiftDate, startTime, endTime }
// candidate = raw shift row from allShifts

function canSwap(sel, candidate) {
  if (!sel || !myName) return false;
  const candName = candidate.attendance_staff?.name;
  if (!candName || candName === sel.staffName) return false;

  // Must be different people
  if (sel.staffName === candName) return false;

  // Can't swap to a day you're already working
  if (sel.shiftDate !== candidate.shift_date) {
    // Check if myName (sel.staffName) already works on candidate's date
    const myShiftsOnCandDate = allShifts.filter(
      s => s.attendance_staff?.name === sel.staffName && s.shift_date === candidate.shift_date
    );
    if (myShiftsOnCandDate.length > 0) return false;

    // Check if candidate's person already works on sel.shiftDate
    const theirShiftsOnMyDate = allShifts.filter(
      s => s.attendance_staff?.name === candName && s.shift_date === sel.shiftDate
    );
    if (theirShiftsOnMyDate.length > 0) return false;
  } else {
    // Same day: can't swap same shift type (same slot)
    if (sel.shiftType === candidate.shift_type) return false;
  }

  // Evening coverage check: after swapping, evening shifts on both dates must still have ≥2
  if (!eveningCoverageOk(sel, candidate)) return false;

  // 7-day stretch check (simple: within visible allShifts)
  if (!checkNoSevenDayStretch(sel.staffName, sel.shiftDate, candidate.shift_date)) return false;
  if (!checkNoSevenDayStretch(candName,      candidate.shift_date, sel.shiftDate)) return false;

  return true;
}

function eveningCoverageOk(sel, candidate) {
  // If either shift being swapped is an evening type, check coverage stays ≥2
  const minEvening = 2;

  // sel is going to candidate.shift_date (gaining candidate.shift_type)
  // candidate person is going to sel.shiftDate (gaining sel.shiftType)

  // Evening count on sel.shiftDate after swap:
  if (EVENING_TYPES.has(sel.shiftType)) {
    const countBefore = allShifts.filter(
      s => s.shift_date === sel.shiftDate && EVENING_TYPES.has(s.shift_type)
    ).length;
    // sel person leaves; candidate person may or may not arrive with an evening type
    const candBringsEvening = EVENING_TYPES.has(candidate.shift_type) ? 1 : 0;
    const countAfter = countBefore - 1 + (EVENING_TYPES.has(sel.shiftType) ? 0 : 0) + candBringsEvening;
    // Actually: sel removes their evening from sel.shiftDate, candidate adds their shift_type on sel.shiftDate
    const afterCount = allShifts.filter(s =>
      s.shift_date === sel.shiftDate &&
      EVENING_TYPES.has(s.shift_type) &&
      !(s.id === sel.shiftId)
    ).length + (EVENING_TYPES.has(candidate.shift_type) ? 1 : 0);
    if (afterCount < minEvening) return false;
  }

  if (EVENING_TYPES.has(candidate.shift_type)) {
    const afterCount = allShifts.filter(s =>
      s.shift_date === candidate.shift_date &&
      EVENING_TYPES.has(s.shift_type) &&
      !(s.id === candidate.id)
    ).length + (EVENING_TYPES.has(sel.shiftType) ? 1 : 0);
    if (afterCount < minEvening) return false;
  }

  return true;
}

function checkNoSevenDayStretch(staffName, removingDate, addingDate) {
  // Get all dates this person works (within visible allShifts), simulate swap
  const dates = allShifts
    .filter(s => s.attendance_staff?.name === staffName)
    .map(s => s.shift_date)
    .filter(d => d !== removingDate);
  dates.push(addingDate);
  dates.sort();

  // Check no 7 consecutive days
  for (let i = 0; i <= dates.length - 7; i++) {
    const first = new Date(dates[i]  + 'T00:00:00');
    const last  = new Date(dates[i+6] + 'T00:00:00');
    const diff  = (last - first) / 86400000;
    if (diff === 6) return false; // 7 consecutive days
  }
  return true;
}

// ── Click handlers ─────────────────────────────────────────────────────
function handlePillClick(shiftId) {
  if (!myName) {
    showStatus('Please log in to request swaps', 'warn', 3000);
    return;
  }

  const shift = allShifts.find(s => s.id === shiftId);
  if (!shift) return;

  const staffName = shift.attendance_staff?.name;

  // If clicking on own shift → select it (or deselect)
  if (staffName === myName) {
    if (selection && selection.shiftId === shiftId) {
      // Deselect
      selection = null;
      hideStatus();
    } else {
      selection = {
        shiftId:   shift.id,
        staffName: staffName,
        shiftType: shift.shift_type,
        shiftDate: shift.shift_date,
        startTime: shift.start_time,
        endTime:   shift.end_time,
      };
      showStatus(`Selected your ${shift.shift_type} on ${fmtDate(shift.shift_date)} — now click a swap target`, 'info');
    }
    renderCalendar();
    return;
  }

  // Clicking another person's shift
  if (!selection) {
    showStatus('Click one of your own shifts first', 'warn', 3000);
    return;
  }

  // Validate
  if (!canSwap(selection, shift)) {
    showStatus('This swap is not allowed (coverage or schedule conflict)', 'error', 3500);
    return;
  }

  // Open confirmation dialog
  openDialog(selection, shift, staffName);
}

// ── Dialog ─────────────────────────────────────────────────────────────
let pendingSwap = null;

function openDialog(myShift, theirShift, theirName) {
  pendingSwap = { myShift, theirShift, theirName };
  const myDate    = fmtDate(myShift.shiftDate);
  const theirDate = fmtDate(theirShift.shift_date);
  document.getElementById('dialogDesc').innerHTML =
    `Swap your <strong>${myShift.shiftType}</strong> (${myDate}) ` +
    `with <strong>${theirName}</strong>'s <strong>${theirShift.shift_type}</strong> (${theirDate})?` +
    `<br><br><span style="color:var(--dim);font-size:0.75rem">This sends a request — ${theirName} will be notified via Telegram.</span>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('confirmBtn').disabled = false;
}

function closeDialog() {
  document.getElementById('overlay').classList.remove('show');
  pendingSwap = null;
}

async function submitSwap() {
  if (!pendingSwap || !myPin) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const { data, error } = await db.rpc('request_swap', {
    p_pin:           myPin,
    p_my_shift_id:   pendingSwap.myShift.shiftId,
    p_their_shift_id: pendingSwap.theirShift.id,
  });

  closeDialog();
  btn.textContent = 'Send Request';

  if (error) {
    showStatus(`Error: ${error.message}`, 'error', 5000);
    return;
  }
  if (data && data.error) {
    showStatus(`Error: ${data.error}`, 'error', 5000);
    return;
  }

  selection = null;
  showStatus(`Swap request sent to ${pendingSwap?.theirName || 'staff member'}`, 'ok', 4000);
  renderCalendar();
  loadPending();
}

// ── Init ───────────────────────────────────────────────────────────────
document.getElementById('pinBtn').addEventListener('click', doLogin);
document.getElementById('pinInput').addEventListener('keyup', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.getElementById('prevBtn').addEventListener('click', () => { monthOffset--; loadRoster(); });
document.getElementById('nextBtn').addEventListener('click', () => { monthOffset++; loadRoster(); });
document.getElementById('statusDismiss').addEventListener('click', hideStatus);
document.getElementById('cancelBtn').addEventListener('click', closeDialog);
document.getElementById('confirmBtn').addEventListener('click', submitSwap);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeDialog();
});

restoreSession();
updateAuthUI();
loadRoster();
</script>
